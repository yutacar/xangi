      }
      #session-list::-webkit-scrollbar-thumb:hover,
      .pane-messages::-webkit-scrollbar-thumb:hover,
      .pane-input::-webkit-scrollbar-thumb:hover {
        background: var(--hairline-strong);
      }
      #session-list::-webkit-scrollbar-track,
      .pane-messages::-webkit-scrollbar-track,
      .pane-input::-webkit-scrollbar-track {
        background: transparent;
      }
      /* オーバーレイ（モバイルサイドバー用） */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9;
      }
      /* ペインタブ（モバイル時のみ表示） */
      #pane-tabs {
        display: none;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        background: var(--surface-1);
        border-bottom: 1px solid var(--hairline);
        padding: 6px 8px;
        gap: 4px;
        flex-shrink: 0;
        scrollbar-width: none;
      }
      #pane-tabs::-webkit-scrollbar {
        display: none;
      }
      .pane-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        background: var(--surface-2);
        color: var(--ink-muted);
        white-space: nowrap;
        border: 1px solid var(--hairline);
        transition:
          background 0.12s ease,
          color 0.12s ease,
          border-color 0.12s ease;
        flex-shrink: 0;
        max-width: 200px;
      }
      .pane-tab .label {
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 140px;
      }
      .pane-tab.active {
        background: var(--primary);
        color: var(--on-primary);
        border-color: var(--primary);
      }
      .pane-tab .tab-close {
        color: inherit;
        opacity: 0.7;
        font-weight: 600;
        padding: 0 2px;
        line-height: 1;
      }
      .pane-tab .tab-close:hover {
        opacity: 1;
      }
      /* モバイル */
      @media (max-width: 768px) {
        #sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          z-index: 10;
          transform: translateX(-100%);
        }
        #sidebar.open {
          transform: translateX(0);
        }
        #overlay.open {
          display: block;
        }
        #panes-toolbar #menu-btn {
          display: block;
        }
        /* モバイルはタブ切替式: アクティブペインのみ表示、タブで切り替え */
        #panes-container {
          grid-template-columns: 1fr !important;
          grid-template-rows: 1fr !important;
        }
        .pane:not(.active) {
          display: none;
        }
        /* モバイルのみペインヘッダーを隠す（タブで代用） */
        .pane-header {
          display: none;
        }
        #pane-tabs {
          display: flex;
        }
        #panes-toolbar .pane-count {
          display: none;
        }
        .pane-messages {
          padding: 14px;
        }
        .pane-input-area {
          padding: 8px 12px 12px;
        }
        .msg-wrapper {
          max-width: 100%;
        }
        .msg {
          font-size: 15px;
        }
        .pane-input {
          font-size: 16px;
        }
        .session-row .row-act {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="overlay" onclick="closeSidebar()"></div>
    <div id="sidebar">
      <div class="top">
        <button class="new-btn" onclick="newSessionInActivePane()">+ New Chat</button>
        <input type="text" placeholder="Search..." oninput="filterSessions(this.value)" />
      </div>
      <div id="session-list"></div>
    </div>
    <div id="main">
      <div id="panes-toolbar">
        <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
        <h1>xangi</h1>
        <span class="spacer"></span>
        <a
          class="tool-link"
          href="/inter-chat"
          target="_blank"
          rel="noopener"
          title="inter-instance-chat 履歴ビューア (別タブで開く)"
        >
          🔁 inter-chat
        </a>
        <a class="tool-link" href="/monitor" title="セッション監視">
          ◉ monitor
        </a>
        <span class="pane-count" id="pane-count">0 panes</span>
        <button
          class="add-pane-btn"
          id="add-pane-btn"
          onclick="addEmptyPane()"
          title="新しいペインを追加"
        >
          + Pane
        </button>
      </div>
      <div id="pane-tabs"></div>
      <div id="panes-container"></div>
    </div>
    <script>
      const sessionListEl = document.getElementById('session-list');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const panesContainer = document.getElementById('panes-container');
      const paneTabsEl = document.getElementById('pane-tabs');
      const paneCountEl = document.getElementById('pane-count');
      const addPaneBtn = document.getElementById('add-pane-btn');

      const MAX_PANES = 8;
      const PANE_STATE_KEY = 'xangi_pane_state_v1';
      let allSessions = [];

      // ─── タイムアウト管理 ───
      // sessionId → { timeoutAt, maxTimeoutAt, timeoutMs }
      // chat SSE / /api/sessions / extend API レスポンスから受け取って保持し、
      // 1 秒ごとの tick で renderTimeoutDisplays が読み出す。
      const sessionTimeouts = {};

      function setSessionTimeout(sessionId, state) {
        if (!sessionId) return;
        if (!state || state.active === false || !state.timeoutAt) {
          delete sessionTimeouts[sessionId];
          return;
        }
        sessionTimeouts[sessionId] = {
          timeoutAt: Number(state.timeoutAt),
          maxTimeoutAt: Number(state.maxTimeoutAt) || 0,
          timeoutMs: Number(state.timeoutMs) || 0,
        };
      }

      function clearSessionTimeout(sessionId) {
        if (!sessionId) return;
        delete sessionTimeouts[sessionId];
      }

      function formatRemaining(ms) {
        if (ms < 0) ms = 0;
        var totalSec = Math.floor(ms / 1000);
        var m = Math.floor(totalSec / 60);
        var s = totalSec % 60;
        return (
          (m < 10 ? '0' + m : '' + m) + ':' + (s < 10 ? '0' + s : '' + s)
        );
      }

      // 1 秒ごとに session-row の timeout-display / extend-btn と、
      // 各 pane の処理中タイムアウト UI を更新
      function tickTimeoutDisplays() {
        var now = Date.now();
        var rows = document.querySelectorAll('.session-row');
        rows.forEach(function (row) {
          var sid = row.getAttribute('data-id');
          if (!sid) return;
          var state = sessionTimeouts[sid];
          var display = row.querySelector('.timeout-display');
          var extendBtn = row.querySelector('.extend-btn');
          if (!state) {
            if (display) display.remove();
            if (extendBtn) extendBtn.remove();
            return;
          }
          var remaining = state.timeoutAt - now;
          if (display) {
            display.textContent = '残り ' + formatRemaining(remaining);
            if (remaining <= 30_000) display.classList.add('warn');
            else display.classList.remove('warn');
          }
          // 上限到達 (残り時間を 2 倍にしたら max を越える) で disabled に切り替え
          if (extendBtn && state.maxTimeoutAt) {
            var pendingRem = Math.max(0, state.timeoutAt - now);
            var wouldExceed = state.timeoutAt + pendingRem > state.maxTimeoutAt;
            if (wouldExceed) extendBtn.classList.add('disabled');
            else extendBtn.classList.remove('disabled');
          }
        });

        // 各 pane の入力エリアにある [+5m][⏱ MM:SS] を、
        // pane の sessionId 対応で更新
        if (typeof paneManager !== 'undefined' && paneManager.panes) {
          paneManager.panes.forEach(function (pane) {
            if (!pane || !pane.sessionId || !pane.timeoutDisplay) return;
            var st = sessionTimeouts[pane.sessionId];
            if (!st || !pane.sending) {
              pane.timeoutDisplay.style.display = 'none';
              if (pane.extendBtn) pane.extendBtn.style.display = 'none';
              return;
            }
            var rem = st.timeoutAt - now;
            pane.timeoutDisplay.textContent = '⏱ ' + formatRemaining(rem);
            pane.timeoutDisplay.style.display = 'inline-block';
            if (rem <= 30_000) pane.timeoutDisplay.classList.add('warn');
            else pane.timeoutDisplay.classList.remove('warn');
            if (pane.extendBtn) {
              // 残り時間を 2 倍にすると max を越えるなら disabled
              var pwouldExceed = st.maxTimeoutAt && st.timeoutAt + rem > st.maxTimeoutAt;
              if (timeoutExtendEnabled && !pwouldExceed) {
                pane.extendBtn.style.display = 'inline-block';
                pane.extendBtn.disabled = false;
              } else {
                pane.extendBtn.style.display = 'none';
              }
            }
          });
        }
      }
      setInterval(tickTimeoutDisplays, 1000);

      async function extendSessionTimeout(sessionId, btn) {
        if (!sessionId) return;
        if (btn && btn.classList.contains('disabled')) return;
        try {
          var res = await fetch(
            '/api/sessions/' + encodeURIComponent(sessionId) + '/timeout/extend',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({}),
            }
          );
          if (res.ok) {
            var data = await res.json();
            setSessionTimeout(sessionId, {
              active: true,
              timeoutAt: data.timeoutAt,
              maxTimeoutAt: data.maxTimeoutAt,
              timeoutMs: data.timeoutMs,
            });
            tickTimeoutDisplays();
          } else if (res.status === 409) {
            // 上限到達 → disabled
            if (btn) btn.classList.add('disabled');
          } else if (res.status === 404 || res.status === 501) {
            // 進行中リクエスト無し or 未サポート → 表示を消す
            clearSessionTimeout(sessionId);
            tickTimeoutDisplays();
          }
        } catch (e) {
          /* ネットワークエラー無視 (次の tick で再評価) */
        }
      }

      // ─── サイドバー ───
      function toggleSidebar() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      }
      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      }

      // ─── メタデータ除去 ───
      function stripMetadata(text) {
        if (typeof text !== 'string') return String(text);
        return text
          .replace(/^\[プラットフォーム: [^\]]*\]\n?/m, '')
          .replace(/^\[チャンネル: [^\]]*\]\n?/m, '')
          .replace(/^\[発言者: [^\]]*\]\n?/m, '')
          .replace(/^\[現在時刻: [^\]]*\]\n?/m, '')
          .replace(/^\[チャンネルID: [^\]]*\]\n?/m, '')
          .trim();
      }

      function convertMediaPaths(text) {
        var imgExts = ['.png', '.jpg', '.jpeg', '.gif', '.webp'];
        var audioExts = ['.mp3', '.wav', '.flac'];
        var videoExts = ['.mp4'];
        return text.replace(/MEDIA:([^\s\n]+)/g, function (match, path) {
          var ext = path.slice(path.lastIndexOf('.')).toLowerCase();
          var url = '/api/workspace-file?path=' + encodeURIComponent(path);
          if (imgExts.indexOf(ext) >= 0)
            return (
              '<img src="' +
              url +
              '" style="max-width:300px;border-radius:6px;margin:4px 0;cursor:pointer;" onclick="window.open(this.src)">'
            );
          if (audioExts.indexOf(ext) >= 0) return '<audio controls src="' + url + '"></audio>';
          if (videoExts.indexOf(ext) >= 0)
            return (
              '<video controls src="' + url + '" style="max-width:100%;border-radius:6px;"></video>'
            );
          return '<a href="' + url + '" target="_blank">' + path.split('/').pop() + '</a>';
        });
      }

      function renderMarkdown(text) {
        text = convertMediaPaths(text);
        if (typeof marked !== 'undefined' && marked.parse) {
          try {
            return marked.parse(text);
          } catch (e) {}
        }
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
          .replace(/(^|\n)(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">$2</a>')
          .replace(/\n/g, '<br>');
      }

      // テキストをクリップボードにコピーする。navigator.clipboard は
      // セキュアコンテキスト (HTTPS / localhost) でしか使えないため、
      // http://<hostname>:port 等の insecure な経路では execCommand に
      // フォールバックする。成否を Promise で返す。
      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          try {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            var ok = document.execCommand('copy');
            document.body.removeChild(ta);
            ok ? resolve() : reject(new Error('execCommand copy failed'));
          } catch (e) {
            reject(e);
          }
        });
      }

      // renderMarkdown() が生成した <pre><code> ブロックそれぞれに
      // コピー ボタンを差し込む。innerHTML 代入後に呼ぶ想定。
      function addCodeCopyButtons(container) {
        var blocks = container.querySelectorAll('pre');
        blocks.forEach(function (pre) {
          if (pre.querySelector('.code-copy-btn')) return;
          var btn = document.createElement('button');
          btn.className = 'code-copy-btn';
          btn.textContent = 'Copy';
          btn.title = 'コピー';
          btn.addEventListener('click', function (ev) {
            ev.stopPropagation();
            var codeEl = pre.querySelector('code') || pre;
            var txt = codeEl.innerText || codeEl.textContent || '';
            copyText(txt).then(function () {
              btn.textContent = 'Copied';
              setTimeout(function () {
                btn.textContent = 'Copy';
              }, 1200);
            }).catch(function () {
              btn.textContent = 'Failed';
              setTimeout(function () {
                btn.textContent = 'Copy';
              }, 1200);
            });
          });
          pre.appendChild(btn);
        });
      }

      // 描画済みコンテナ内の外部リンク (http/https) を新しいタブで開く。
      // marked.js は既定でリンクに target を付けないため、innerHTML 代入後に
      // 付与する。内部リンク (/inter-chat 等) は個別対応済みなので対象外。
      function addLinkTargets(container) {
        container.querySelectorAll('a').forEach(function (a) {
          var href = a.getAttribute('href') || '';
          if (/^https?:\/\//i.test(href)) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
          }
        });
      }

      function formatTime(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        const h = d.getHours().toString().padStart(2, '0');
        const m = d.getMinutes().toString().padStart(2, '0');
        return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + h + ':' + m;
      }

      // 自走モードのプロンプト（内部リクエスト）はユーザー発言として履歴に残るが、
      // UI には出さない。先頭マーカーで判別する。
      const AUTOTALK_SENTINEL = '[__XANGI_AUTOTALK_INTERNAL__]';
      function filterAutoTalkInternal(m) {
        if (!m || m.role !== 'user') return true;
        var c = typeof m.content === 'string' ? m.content : '';
        return !c.startsWith(AUTOTALK_SENTINEL);
      }

      // ─── Pane クラス ───
      let _paneIdCounter = 0;
      class Pane {
        constructor(opts) {
          opts = opts || {};
          this.paneId = 'pane-' + ++_paneIdCounter;
          this.sessionId = null;
          this.sending = false;
          this.abortController = null;
          this.pendingFiles = [];
          this.platform = 'web'; // 既定。loadSession で更新

          this.el = document.createElement('div');
          this.el.className = 'pane';
          this.el.dataset.paneId = this.paneId;
          this.el.addEventListener('mousedown', () => paneManager.focus(this));

          this._build();
        }

        _build() {
          // header
          var header = document.createElement('div');
          header.className = 'pane-header';
          this.titleEl = document.createElement('span');
          this.titleEl.className = 'pane-title empty';
          this.titleEl.textContent = '(empty)';
          this.titleEl.title = 'Click to edit title';
          this.titleEl.addEventListener('click', () => this.editTitle());
          var closeBtn = document.createElement('button');
          closeBtn.className = 'pane-close';
          closeBtn.textContent = '×';
          closeBtn.title = 'Close pane';
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            paneManager.remove(this);
          });
          header.appendChild(this.titleEl);
          header.appendChild(closeBtn);
          this.el.appendChild(header);

          // messages
          this.messagesEl = document.createElement('div');
          this.messagesEl.className = 'pane-messages';
          this.messagesEl.innerHTML =
            '<div class="empty-state">Select a session<br>or click <button type="button" class="empty-cta" onclick="newSessionInActivePane()">+ New Chat</button></div>';
          this.el.appendChild(this.messagesEl);

          // 自動追従スクロール (ChatGPT 風):
          // ユーザが下端付近にいるときだけ AI の更新で自動スクロール、
          // 上にスクロール中は固定 (勝手に下に飛ばない)。
          this.followBottom = true;
          this.messagesEl.addEventListener('scroll', () => {
            var el = this.messagesEl;
            // 下端から 80px 以内なら "下端付近にいる" とみなす
            var distFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
            this.followBottom = distFromBottom < 80;
          });

          // attach preview
          this.attachPreviewEl = document.createElement('div');
          this.attachPreviewEl.className = 'pane-attach-preview';
          this.el.appendChild(this.attachPreviewEl);

          // input area
          var inputArea = document.createElement('div');
          inputArea.className = 'pane-input-area';
          var composer = document.createElement('div');
          composer.className = 'pane-composer';
          var attachBtn = document.createElement('button');
          attachBtn.className = 'pane-attach-btn';
          attachBtn.title = 'Attach file';
          attachBtn.innerHTML = '&#128206;';
          this.fileInputEl = document.createElement('input');
          this.fileInputEl.type = 'file';
          this.fileInputEl.className = 'pane-file-input';
          this.fileInputEl.multiple = true;
          if (window._uploadAccept) {
            this.fileInputEl.accept = window._uploadAccept;
          }
          this.fileInputEl.addEventListener('change', (e) => this._handleFileSelect(e));
          attachBtn.addEventListener('click', () => this.fileInputEl.click());
          this.inputEl = document.createElement('textarea');
          this.inputEl.className = 'pane-input';
          this.inputEl.rows = 1;
          this.inputEl.placeholder = 'Select a session or start a new chat';
          this.inputEl.disabled = true;
          this.inputEl.addEventListener('keydown', (e) => this._handleKey(e));
          this.inputEl.addEventListener('input', () => {
            this.inputEl.style.height = 'auto';
            this.inputEl.style.height = Math.min(this.inputEl.scrollHeight, 120) + 'px';
          });
          composer.appendChild(attachBtn);
          composer.appendChild(this.fileInputEl);
          composer.appendChild(this.inputEl);

          this.sendBtn = document.createElement('button');
          this.sendBtn.className = 'pane-send action-btn';
          this.sendBtn.textContent = 'Send';
          this.sendBtn.disabled = true;
          this.sendBtn.addEventListener('click', () => this.send());

          this.stopBtn = document.createElement('button');
          this.stopBtn.className = 'pane-stop action-btn';
          this.stopBtn.textContent = '\u{23F9}';
          this.stopBtn.title = '応答を中断';
          this.stopBtn.addEventListener('click', () => this.stopChat());

          // 処理中タイムアウト UI: [延長] [⏱ MM:SS]
          // _setProcessing(on=true) でのみ display 切替、stopBtn と同列に並べる
          this.extendBtn = document.createElement('button');
          this.extendBtn.className = 'pane-extend action-btn';
          this.extendBtn.textContent = '延長';
          this.extendBtn.title = '残り時間を 2 倍にする (上限まで)';
          this.extendBtn.style.display = 'none';
          this.extendBtn.addEventListener('click', () => this.extendTimeout());

          this.timeoutDisplay = document.createElement('span');
          this.timeoutDisplay.className = 'pane-timeout';
          this.timeoutDisplay.style.display = 'none';

          inputArea.appendChild(composer);
          inputArea.appendChild(this.sendBtn);
          inputArea.appendChild(this.stopBtn);
          inputArea.appendChild(this.extendBtn);
          inputArea.appendChild(this.timeoutDisplay);
          this.el.appendChild(inputArea);
        }

        _handleKey(e) {
          if (e.isComposing || e.keyCode === 229) return;
          // スマホ幅では Enter を改行に使えるよう、送信はボタンのみに限定する。
          // ソフトキーボードでは Shift+Enter が事実上打てず、改行が入れられないため。
          var isMobile = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
          if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
            e.preventDefault();
            this.send();
          }
        }

        _handleFileSelect(e) {
          for (var f of e.target.files) {
            this._addPendingFile(f);
          }
          e.target.value = '';
        }

        async _addPendingFile(file) {
          var formData = new FormData();
          formData.append('file', file);
          try {
            var res = await fetch('/api/upload', { method: 'POST', body: formData });
            var data = await res.json();
            if (!res.ok) {
              var reason =
                (data.rejected && data.rejected[0] && data.rejected[0].reason) ||
                data.error ||
                'Upload failed';
              alert(file.name + ': ' + reason);
              return;
            }
            if (data.rejected && data.rejected.length > 0) {
              alert(data.rejected.map((r) => r.name + ': ' + r.reason).join('\n'));
            }
            if (data.files && data.files.length > 0) {
              var f = data.files[0];
              var localUrl = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
              this.pendingFiles.push({ name: f.name, path: f.path, localUrl: localUrl });
              this._renderAttachPreview();
            }
          } catch (err) {
            console.error('Upload failed:', err);
          }
        }

        _removePendingFile(idx) {
          if (this.pendingFiles[idx] && this.pendingFiles[idx].localUrl) {
            URL.revokeObjectURL(this.pendingFiles[idx].localUrl);
          }
          this.pendingFiles.splice(idx, 1);
          this._renderAttachPreview();
        }

        _renderAttachPreview() {
          if (this.pendingFiles.length === 0) {
            this.attachPreviewEl.style.display = 'none';
            this.attachPreviewEl.innerHTML = '';
            return;
          }
          this.attachPreviewEl.style.display = 'block';
          this.attachPreviewEl.innerHTML = '';
          var self = this;
          this.pendingFiles.forEach(function (f, i) {
            var item = document.createElement('span');
            item.className = 'preview-item';
            if (f.localUrl) {
              var img = document.createElement('img');
              img.src = f.localUrl;
              item.appendChild(img);
            }
            item.appendChild(document.createTextNode(' ' + f.name + ' '));
            var rm = document.createElement('span');
            rm.className = 'remove-btn';
            rm.textContent = '×';
            rm.addEventListener('click', () => self._removePendingFile(i));
            item.appendChild(rm);
            self.attachPreviewEl.appendChild(item);
          });
        }

        addMessage(text, role, opts) {
          opts = opts || {};
          var wrapper = document.createElement('div');
          wrapper.className = 'msg-wrapper ' + role;
          if (opts.id) {
            wrapper.dataset.msgId = opts.id;
          }
          var div = document.createElement('div');
          div.className = 'msg ' + role;
          var cleaned = stripMetadata(text);
          if (role === 'assistant') {
            div.innerHTML = renderMarkdown(cleaned);
            div.style.whiteSpace = 'normal';
            addCodeCopyButtons(div);
            addLinkTargets(div);
          } else {
            div.textContent = cleaned;
          }
          wrapper.appendChild(div);

          // Discord 風 ⋯ アクションメニュー
          if (opts.id && (role === 'user' || role === 'assistant')) {
            wrapper.appendChild(this._buildMsgActions(wrapper, role, div));
          }

          if (opts.createdAt) {
            var t = document.createElement('div');
            t.className = 'msg-time';
            var timeText = formatTime(opts.createdAt);
            if (opts.edited) timeText += ' (編集済み)';
            t.textContent = timeText;
            wrapper.appendChild(t);
          } else if (opts.edited) {
            var lbl = document.createElement('div');
            lbl.className = 'msg-edited-label';
            lbl.textContent = '(編集済み)';
            wrapper.appendChild(lbl);
          }

          if (role === 'assistant' && opts.usage) {
            var u = opts.usage;
            var parts = [];
            if (u.num_turns != null) parts.push('\u{1F504} ' + u.num_turns + ' turns');
            if (u.duration_ms != null)
              parts.push('\u{23F1}️ ' + (u.duration_ms / 1000).toFixed(1) + 's');
            if (u.total_cost_usd != null) parts.push('\u{1F4B0} $' + u.total_cost_usd.toFixed(4));
            if (parts.length > 0) {
              var uel = document.createElement('div');
              uel.className = 'msg-usage';
              uel.innerHTML = parts
                .map(function (p) {
                  return '<span>' + p + '</span>';
                })
                .join('');
              wrapper.appendChild(uel);
            }
          }

          if (role === 'assistant' && opts.replySuggestions?.length) {
            this._addReplySuggestions(wrapper, opts.replySuggestions);
          }

          this.messagesEl.appendChild(wrapper);
          // 自分のメッセージ (user) 送信時は強制で下に追従させる
          // (followBottom フラグを true に戻して以降の AI 更新も追従)
          if (role === 'user') {
            this.followBottom = true;
          }
          this._autoScroll();
          return div;
        }

        /** followBottom が true のときだけ末尾に追従。
         *  ユーザが上にスクロールしているときは何もしない。 */
        _autoScroll() {
          if (this.followBottom) {
            this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
          }
        }

        _buildMsgActions(wrapper, role, contentDiv) {
          var self = this;
          var actions = document.createElement('div');
          actions.className = 'msg-actions';

          var copyBtn = document.createElement('button');
          copyBtn.className = 'msg-action-btn';
          copyBtn.textContent = 'Copy';
          copyBtn.title = 'コピー';
          copyBtn.addEventListener('click', function (ev) {
            ev.stopPropagation();
            // 各コードブロック内のコピー ボタン (.code-copy-btn) は contentDiv の
            // 子要素なので、そのまま innerText を読むとボタン文字列
            // ('Copy'/'Copied'/'Failed') が混入する（opacity:0 でも innerText には
            // 含まれる）。読み取りの間だけ display:none にして除外する。
            // clone せず display:none にすることで innerText の改行整形を維持する。
            var codeBtns = contentDiv.querySelectorAll('.code-copy-btn');
            codeBtns.forEach(function (n) { n.style.display = 'none'; });
            var txt = contentDiv.innerText || contentDiv.textContent || '';
            codeBtns.forEach(function (n) { n.style.display = ''; });
            copyText(txt).then(function () {
              copyBtn.textContent = 'Copied';
              setTimeout(function () {
                copyBtn.textContent = 'Copy';
              }, 1200);
            }).catch(function () {
              copyBtn.textContent = 'Failed';
              setTimeout(function () {
                copyBtn.textContent = 'Copy';
              }, 1200);
            });
          });
          actions.appendChild(copyBtn);

          if (role === 'user') {
            var editBtn = document.createElement('button');
            editBtn.className = 'msg-action-btn';
            editBtn.textContent = 'Edit';
            editBtn.title = '編集';
            editBtn.addEventListener('click', function (ev) {
              ev.stopPropagation();
              self._beginEdit(wrapper, contentDiv);
            });
            actions.appendChild(editBtn);
          }

          var delBtn = document.createElement('button');
          delBtn.className = 'msg-action-btn danger';
          delBtn.textContent = 'Delete';
          delBtn.title = '削除';
          delBtn.addEventListener('click', function (ev) {
            ev.stopPropagation();
            self._deleteMessage(wrapper);
          });
          actions.appendChild(delBtn);

          return actions;
        }

        _addReplySuggestions(wrapper, suggestions) {
          if (!wrapper || !Array.isArray(suggestions) || suggestions.length === 0) return;
          if (wrapper.querySelector('.reply-suggestions')) return;
          var self = this;
          var box = document.createElement('div');
          box.className = 'reply-suggestions';
          var toggle = document.createElement('button');
          toggle.type = 'button';
          toggle.className = 'reply-suggestions-toggle';
          toggle.textContent = '返信候補';
          toggle.addEventListener('click', function () {
            box.classList.toggle('open');
          });
          var options = document.createElement('div');
          options.className = 'reply-suggestions-options';
          suggestions.forEach(function (suggestion, index) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'reply-suggestion-option';
            btn.textContent = index + 1 + '. ' + suggestion;
            btn.addEventListener('click', function () {
              self.inputEl.value = suggestion;
              self.inputEl.dispatchEvent(new Event('input'));
              box.remove();
              self.send();
            });
            options.appendChild(btn);
          });
          box.appendChild(toggle);
          box.appendChild(options);
          wrapper.appendChild(box);
        }

        _beginEdit(wrapper, contentDiv) {
          var self = this;
          var messageId = wrapper.dataset.msgId;
          if (!messageId) return;
          var originalText = contentDiv.textContent || '';

          var ta = document.createElement('textarea');
          ta.className = 'msg-edit';
          ta.value = originalText;

          var actionsRow = document.createElement('div');
          actionsRow.className = 'msg-edit-actions';
          var saveBtn = document.createElement('button');
          saveBtn.className = 'msg-action-btn';
          saveBtn.textContent = 'Save';
          var cancelBtn = document.createElement('button');
          cancelBtn.className = 'msg-action-btn';
          cancelBtn.textContent = 'Cancel';
          actionsRow.appendChild(saveBtn);
          actionsRow.appendChild(cancelBtn);

          contentDiv.style.display = 'none';
          wrapper.insertBefore(ta, contentDiv.nextSibling);
          wrapper.insertBefore(actionsRow, ta.nextSibling);
          ta.focus();
          ta.setSelectionRange(ta.value.length, ta.value.length);

          var cleanup = function () {
            ta.remove();
            actionsRow.remove();
            contentDiv.style.display = '';
          };

          cancelBtn.addEventListener('click', cleanup);
          saveBtn.addEventListener('click', async function () {
            var newText = ta.value;
            if (newText === originalText) {
              cleanup();
              return;
            }
            saveBtn.disabled = true;
            cancelBtn.disabled = true;
            try {
              var res = await fetch(
                '/api/sessions/' +
                  encodeURIComponent(self.sessionId) +
                  '/messages/' +
                  encodeURIComponent(messageId),
                {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ content: newText }),
                }
              );
              if (!res.ok) throw new Error('edit failed: ' + res.status);
              contentDiv.textContent = newText;
              // (編集済み) ラベルを付ける (もし無ければ)
              var timeEl = wrapper.querySelector('.msg-time');
              if (timeEl) {
                if (!/編集済み/.test(timeEl.textContent)) {
                  timeEl.textContent += ' (編集済み)';
                }
              } else if (!wrapper.querySelector('.msg-edited-label')) {
                var lbl = document.createElement('div');
                lbl.className = 'msg-edited-label';
                lbl.textContent = '(編集済み)';
                wrapper.appendChild(lbl);
              }
              cleanup();
            } catch (err) {
              alert('編集に失敗しました: ' + err.message);
              saveBtn.disabled = false;
              cancelBtn.disabled = false;
            }
          });
        }

        async _deleteMessage(wrapper) {
          var messageId = wrapper.dataset.msgId;
          if (!messageId) return;
          if (!confirm('このメッセージを削除しますか？ (jsonl も書き換わります)')) return;
          try {
            var res = await fetch(
              '/api/sessions/' +
                encodeURIComponent(this.sessionId) +
                '/messages/' +
                encodeURIComponent(messageId),
              { method: 'DELETE' }
            );
            if (!res.ok) throw new Error('delete failed: ' + res.status);
            wrapper.remove();
          } catch (err) {
            alert('削除に失敗しました: ' + err.message);
          }
        }

        async refreshHistory() {
          // 自走モード等で裏で進んだ履歴を読み直す（最後のメッセージ以降だけ追加するのではなく、シンプルに全部再描画）
          if (!this.sessionId || this.sending) return;
          try {
            var res = await fetch('/api/sessions/' + encodeURIComponent(this.sessionId));
            var data = await res.json();
            var msgs = (data.messages || []).filter(filterAutoTalkInternal).filter(function (m) {
              return m.role !== 'error';
            });
            // メッセージ数が変わってなければ何もしない
            var existing = this.messagesEl.querySelectorAll('.msg-wrapper').length;
            if (existing >= msgs.length) return;
            this.messagesEl.innerHTML = '';
            for (var i = 0; i < msgs.length; i++) {
              var m = msgs[i];
              var content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
              this.addMessage(content, m.role, {
                id: m.id,
                createdAt: m.createdAt,
                usage: m.usage,
                edited: m.edited,
                replySuggestions: this.platform === 'web' ? m.replySuggestions : [],
              });
            }
          } catch (_) {}
        }

        async loadSession(id) {
          if (id === this.sessionId && !this.sending) return;
          if (this.sending && this.abortController) {
            try {
              this.abortController.abort();
            } catch (_) {}
          }
          this.sending = false;
          this.abortController = null;
          this.sendBtn.style.display = '';
          this.stopBtn.style.display = 'none';

          this.sessionId = id;
          this.messagesEl.innerHTML = '';
          renderSessions(allSessions);

          try {
            var res = await fetch('/api/sessions/' + encodeURIComponent(id));
            var data = await res.json();
            this._setTitle(data.title || id);
            var msgs = (data.messages || []).filter(filterAutoTalkInternal);
            for (var i = 0; i < msgs.length; i++) {
              var m = msgs[i];
              if (m.role === 'error') continue;
              var content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
              this.addMessage(content, m.role, {
                id: m.id,
                createdAt: m.createdAt,
                usage: m.usage,
                edited: m.edited,
                replySuggestions: data.platform === 'web' ? m.replySuggestions : [],
              });
            }
            var info = allSessions.find(function (s) {
              return s.id === id;
            });
            this.platform = info ? info.platform : 'web';
            if (this.platform === 'web') {
              this.inputEl.disabled = false;
              this.sendBtn.disabled = false;
              this.inputEl.placeholder = 'Message...';
            } else {
              this.inputEl.disabled = true;
              this.sendBtn.disabled = true;
              this.inputEl.placeholder = 'Read-only (Discord/Slack session)';
              var resumeBtn = document.createElement('button');
              resumeBtn.className = 'resume-btn';
              resumeBtn.textContent = '\u{1F4AC} Continue here (fork as new web session)';
              resumeBtn.addEventListener('click', () => this.resumeFromCurrent());
              this.messagesEl.appendChild(resumeBtn);
            }
          } catch (e) {}
        }

        _setTitle(t) {
          this.titleEl.textContent = t || '(untitled)';
          this.titleEl.classList.toggle('empty', !t);
          if (typeof paneManager !== 'undefined') paneManager._renderTabs();
        }

        _setProcessing(on) {
          this.sending = on;
          this.sendBtn.style.display = on ? 'none' : '';
          this.stopBtn.style.display = on ? 'inline-block' : 'none';
          this.inputEl.disabled = on;
          // 処理 OFF になったら timeout UI も即剥がす (tick が走るまで待たない)
          if (!on) {
            if (this.timeoutDisplay) this.timeoutDisplay.style.display = 'none';
            if (this.extendBtn) this.extendBtn.style.display = 'none';
          }
        }

        extendTimeout() {
          extendSessionTimeout(this.sessionId, this.extendBtn);
        }

        async send() {
          var msg = this.inputEl.value.trim();
          if (!msg || this.sending) return;
          if (this.platform !== 'web' && this.sessionId) return;

          var fullMsg = msg;
          if (this.pendingFiles.length > 0) {
            var attachments = this.pendingFiles
              .map(function (f) {
                return '[添付ファイル] ' + f.path;
              })
              .join('\n');
            fullMsg = msg + '\n\n' + attachments;
          }

          this.addMessage(msg, 'user', { createdAt: new Date().toISOString() });
          var userWrapper = this.messagesEl.lastElementChild;
          if (this.pendingFiles.length > 0) {
            var lastWrapper = this.messagesEl.lastElementChild;
            if (lastWrapper) {
              var imgContainer = document.createElement('div');
              imgContainer.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;padding:4px 0;';
              this.pendingFiles.forEach(function (f) {
                if (f.localUrl) {
                  var img = document.createElement('img');
                  img.src = f.localUrl;
                  img.style.cssText = 'max-height:80px;border-radius:4px;';
                  imgContainer.appendChild(img);
                }
              });
              if (imgContainer.children.length > 0) {
                lastWrapper.querySelector('.msg').appendChild(imgContainer);
              }
            }
          }
          this.pendingFiles = [];
          this._renderAttachPreview();

          this.inputEl.value = '';
          this.inputEl.style.height = 'auto';
          this._setProcessing(true);

          var toolsWrapper = document.createElement('div');
          toolsWrapper.className = 'msg-wrapper assistant';
          var toolsDiv = document.createElement('div');
          toolsDiv.className = 'msg thinking';
          // 思考中表示: スピナー + ステータス語ローテーション + 経過秒
          // (Discord/Slack の StreamSession 表示と同じスタイル)
          var THINKING_FRAMES = ['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏'];
          var THINKING_VERBS = ['考え中', '思考中', '調査中', '整理中', '組み立て中', '推敲中'];
          var thinkingStatus = document.createElement('div');
          thinkingStatus.textContent = THINKING_FRAMES[0] + ' ' + THINKING_VERBS[0] + '… 0s';
          toolsDiv.appendChild(thinkingStatus);
          var thinkingTick = 0;
          var thinkingStartedAt = Date.now();
          var thinkingTimer = setInterval(function () {
            if (!toolsDiv.isConnected) {
              clearInterval(thinkingTimer);
              return;
            }
            thinkingTick++;
            var frame = THINKING_FRAMES[thinkingTick % THINKING_FRAMES.length];
            var verb = THINKING_VERBS[Math.floor(thinkingTick / 4) % THINKING_VERBS.length];
            var sec = Math.floor((Date.now() - thinkingStartedAt) / 1000);
            thinkingStatus.textContent = frame + ' ' + verb + '… ' + sec + 's';
          }, 1000);
          toolsWrapper.appendChild(toolsDiv);
          this.messagesEl.appendChild(toolsWrapper);
          // Thinking バブルが入力欄の裏に隠れる問題対策:
          // append 後にスクロール末尾追従させる。
          this._autoScroll();

          var assistantWrapper = null;
          var assistantDiv = null;
          var toolHistory = [];

          this.abortController = new AbortController();
          var self = this;
          try {
            var res = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ appSessionId: this.sessionId || undefined, message: fullMsg }),
              signal: this.abortController.signal,
            });

            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';

            while (true) {
              var chunk = await reader.read();
              if (chunk.done) break;
              buf += decoder.decode(chunk.value, { stream: true });

              var lines = buf.split('\n');
              buf = lines.pop() || '';

              var eventType = '';
              for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.startsWith('event: ')) {
                  eventType = line.slice(7);
                } else if (line.startsWith('data: ') && eventType) {
                  try {
                    var d = JSON.parse(line.slice(6));
                    if (eventType === 'text') {
                      if (!assistantWrapper) {
                        toolsWrapper.remove();
                        assistantWrapper = document.createElement('div');
                        assistantWrapper.className = 'msg-wrapper assistant';
                        assistantDiv = document.createElement('div');
                        assistantDiv.className = 'msg assistant';
                        assistantWrapper.appendChild(assistantDiv);
                        self.messagesEl.appendChild(assistantWrapper);
                      }
                      assistantDiv.textContent = d.fullText + ' ▌';
                      self._autoScroll();
                    } else if (eventType === 'tool') {
                      toolHistory.push(d.toolName);
                      var toolLine = document.createElement('div');
                      toolLine.className = 'tool-line';
                      toolLine.textContent = '\u{1F527} ' + d.toolName + (d.inputSummary || '');
                      // ステータス行 (スピナー) は常に最下段に残す
                      toolsDiv.insertBefore(toolLine, thinkingStatus);
                      self._autoScroll();
                    } else if (eventType === 'done') {
                      if (!assistantWrapper) {
                        assistantWrapper = document.createElement('div');
                        assistantWrapper.className = 'msg-wrapper assistant';
                        assistantDiv = document.createElement('div');
                        assistantDiv.className = 'msg assistant';
                        assistantDiv.style.whiteSpace = 'normal';
                        assistantWrapper.appendChild(assistantDiv);
                        self.messagesEl.appendChild(assistantWrapper);
                      }
                      if (toolsWrapper.parentElement) toolsWrapper.remove();
                      assistantDiv.style.whiteSpace = 'normal';
                      assistantDiv.innerHTML = renderMarkdown(d.response || '');
                      addCodeCopyButtons(assistantDiv);
                      addLinkTargets(assistantDiv);
                      var t = document.createElement('div');
                      t.className = 'msg-time';
                      t.textContent = formatTime(new Date().toISOString());
                      assistantWrapper.appendChild(t);
                      if (d.usage) {
                        var parts = [];
                        if (d.usage.num_turns != null)
                          parts.push('\u{1F504} ' + d.usage.num_turns + ' turns');
                        if (d.usage.duration_ms != null)
                          parts.push('\u{23F1}️ ' + (d.usage.duration_ms / 1000).toFixed(1) + 's');
                        if (d.usage.total_cost_usd != null)
                          parts.push('\u{1F4B0} $' + d.usage.total_cost_usd.toFixed(4));
                        if (parts.length > 0) {
                          var uel = document.createElement('div');
                          uel.className = 'msg-usage';
                          uel.innerHTML = parts
                            .map(function (p) {
                              return '<span>' + p + '</span>';
                            })
                            .join('');
                          assistantWrapper.appendChild(uel);
                        }
                      }
                      if (d.sessionId) self.sessionId = d.sessionId;
                      // user / assistant の transcript ID を bubble に紐付ける
                      // (ストリーミング後の編集・削除を有効にするため)
                      if (d.userMessageId && userWrapper) {
                        userWrapper.dataset.msgId = d.userMessageId;
                        var userMsgDiv = userWrapper.querySelector('.msg');
                        if (userMsgDiv && !userWrapper.querySelector('.msg-actions')) {
                          userWrapper.appendChild(
                            self._buildMsgActions(userWrapper, 'user', userMsgDiv)
                          );
                        }
                      }
                      if (d.assistantMessageId && assistantWrapper) {
                        assistantWrapper.dataset.msgId = d.assistantMessageId;
                        if (!assistantWrapper.querySelector('.msg-actions')) {
                          assistantWrapper.appendChild(
                            self._buildMsgActions(assistantWrapper, 'assistant', assistantDiv)
                          );
                        }
                      }
                      if (assistantWrapper && d.replySuggestions?.length) {
                        self._addReplySuggestions(assistantWrapper, d.replySuggestions);
                      }
                      loadSessions();
                    } else if (eventType === 'timeout') {
                      // バックエンドから timeoutAt が届いたら sessionTimeouts に保存して
                      // 即座にカウントダウンを描画 (次の tick / renderSessions で反映)
                      var tsid = d.sessionId || self.sessionId;
                      if (tsid) {
                        // 初回 (まだ追跡されていない) のみ loadSessions で session-row を refresh。
                        // 連続する timeout-extended の度に DOM 全消去 / 再構築すると重い。
                        var alreadyTracked = !!sessionTimeouts[tsid];
                        setSessionTimeout(tsid, {
                          active: true,
                          timeoutAt: d.timeoutAt,
                          maxTimeoutAt: d.maxTimeoutAt,
                          timeoutMs: d.timeoutMs,
                        });
                        if (!alreadyTracked) loadSessions();
                        tickTimeoutDisplays();
                      }
                    } else if (eventType === 'timeout_cleared') {
                      var csid = d.sessionId || self.sessionId;
                      if (csid) {
                        // active=false に伴って sessionTimeouts も剥がす。loadSessions は
                        // 'done' イベント側で呼ばれるので、ここで二度叩かない。
                        clearSessionTimeout(csid);
                        tickTimeoutDisplays();
                      }
                    } else if (eventType === 'error') {
                      toolsWrapper.remove();
                      self.addMessage(d.message || 'Error', 'error');
                    }
                  } catch (e) {}
                  eventType = '';
                }
              }
            }
          } catch (err) {
            if (toolsWrapper.parentElement) toolsWrapper.remove();
            if (assistantWrapper && assistantWrapper.parentElement) assistantWrapper.remove();
            this.addMessage(err.name === 'AbortError' ? 'Stopped' : 'Connection error', 'error');
          } finally {
            clearInterval(thinkingTimer);
            this._setProcessing(false);
            this.abortController = null;
            // 裏で完了したペインが手前の入力からフォーカスを奪わないよう、アクティブなペインのみ復帰
            if (typeof paneManager === 'undefined' || paneManager.activePane === this) {
              this.inputEl.focus();
            }
          }
        }

        async stopChat() {
          // クライアント側 SSE 切断 (ストリーミング描画停止)
          if (this.abortController) {
            try {
              this.abortController.abort();
            } catch (_) {}
          }
          // サーバ側 runner / LLM 子プロセスを実際に止める。
          // 旧実装は abort のみで、Claude プロセスが裏で走り続けて
          // 実質「途中で止められない」状態だった。
          if (this.sessionId) {
            try {
              await fetch('/api/sessions/' + encodeURIComponent(this.sessionId) + '/stop', {
                method: 'POST',
              });
            } catch (_) {}
          }
          this._setProcessing(false);
        }

        async newSession() {
          if (this.sending && this.abortController) {
            try {
              this.abortController.abort();
            } catch (_) {}
          }
          this.sending = false;
          this.abortController = null;
          this.sendBtn.style.display = '';
          this.stopBtn.style.display = 'none';

          try {
            var res = await fetch('/api/sessions', { method: 'POST' });
            var data = await res.json();
            if (data.sessionId) this.sessionId = data.sessionId;
          } catch (e) {}
          this.platform = 'web';
          this.messagesEl.innerHTML = '';
          this._setTitle('');
          this.inputEl.disabled = false;
          this.sendBtn.disabled = false;
          this.inputEl.placeholder = 'Message...';
          loadSessions();
          closeSidebar();
          this.inputEl.focus();
        }

        async resumeFromCurrent() {
          if (!this.sessionId) return;
          try {
            var res = await fetch(
              '/api/sessions/' + encodeURIComponent(this.sessionId) + '/resume',
              { method: 'POST' }
            );
            var data = await res.json();
            if (data.ok) {
              this.sessionId = data.sessionId || this.sessionId;
              this.platform = 'web';
              this.inputEl.disabled = false;
              this.sendBtn.disabled = false;
              this.inputEl.placeholder = 'Message...';
              var btns = this.messagesEl.querySelectorAll('button');
              btns.forEach(function (b) {
                b.remove();
              });
              loadSessions();
              if (typeof paneManager !== 'undefined') paneManager._renderTabs();
              this.inputEl.focus();
            }
          } catch (e) {}
        }

        async editTitle() {
          if (!this.sessionId) return;
          var current = this.titleEl.classList.contains('empty') ? '' : this.titleEl.textContent;
          var t = prompt('Session title:', current);
          if (t && t !== current) {
            await fetch('/api/sessions/' + encodeURIComponent(this.sessionId), {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title: t }),
            });
            this._setTitle(t);
            loadSessions();
          }
        }

        destroy() {
          if (this.sending && this.abortController) {
            try {
              this.abortController.abort();
            } catch (_) {}
          }
          // localUrl の解放
          for (var i = 0; i < this.pendingFiles.length; i++) {
            if (this.pendingFiles[i].localUrl) URL.revokeObjectURL(this.pendingFiles[i].localUrl);
          }
          this.el.remove();
        }
      }

      // ─── PaneManager ───
      class PaneManager {
        constructor(container) {
          this.container = container;
          this.panes = [];
          this.activePane = null;
          this._renderEmpty();
        }

        _renderEmpty() {
          if (this.panes.length === 0) {
            this.container.innerHTML = '';
            var empty = document.createElement('div');
            empty.className = 'panes-empty';
            empty.innerHTML =
              'No panes open<br>Click <button type="button" class="empty-cta" onclick="newSessionInActivePane()">+ New Chat</button> in the sidebar, or select a session to open.';
            this.container.appendChild(empty);
            this.container.className = '';
          }
        }

        // 開いているペインの並び（各ペインの sessionId）と現在フォーカス中のペインを
        // localStorage に保存し、ブラウザ更新後も同じ状態を復元できるようにする。
        // _renderTabs はペイン追加・削除・フォーカス変更・タイトル更新の全経路から
        // 呼ばれるので、ここに載せておけば個別に persist 呼び出しを散らばせずに済む。
        _persist() {
          try {
            var ids = this.panes.map(function (p) {
              return p.sessionId || null;
            });
            var activeIdx = this.panes.indexOf(this.activePane);
            localStorage.setItem(PANE_STATE_KEY, JSON.stringify({ ids: ids, activeIdx: activeIdx }));
          } catch (_) {
            // localStorage 不可 (プライベートブラウジング等) でも致命的ではないので無視
          }
        }

        _renderTabs() {
          this._persist();
          paneTabsEl.innerHTML = '';
          if (this.panes.length === 0) return;
          var self = this;
          this.panes.forEach(function (pane, idx) {
            var tab = document.createElement('div');
            tab.className = 'pane-tab' + (pane === self.activePane ? ' active' : '');
            var label = document.createElement('span');
            label.className = 'label';
            var titleText = pane.titleEl.classList.contains('empty')
              ? 'Pane ' + (idx + 1)
              : pane.titleEl.textContent;
            label.textContent = titleText;
            tab.appendChild(label);
            var close = document.createElement('span');
            close.className = 'tab-close';
            close.textContent = '×';
            close.addEventListener('click', function (e) {
              e.stopPropagation();
              self.remove(pane);
            });
            tab.appendChild(close);
            tab.addEventListener('click', function () {
              self.focus(pane);
            });
            paneTabsEl.appendChild(tab);
          });
        }

        add(opts) {
          opts = opts || {};
          if (this.panes.length >= MAX_PANES) {
            alert('最大 ' + MAX_PANES + ' ペインまでです。');
            return null;
          }
          // 空状態の表示を消す
          if (this.panes.length === 0) {
            this.container.innerHTML = '';
          }
          var pane = new Pane();
          this.panes.push(pane);
          this.container.appendChild(pane.el);
          this.layout();
          this.focus(pane);
          if (opts.sessionId) {
            pane.loadSession(opts.sessionId);
          }
          this._updateToolbar();
          this._renderTabs();
          return pane;
        }

        remove(pane) {
          var idx = this.panes.indexOf(pane);
          if (idx < 0) return;
          pane.destroy();
          this.panes.splice(idx, 1);
          if (this.activePane === pane) {
            this.activePane = this.panes[Math.min(idx, this.panes.length - 1)] || null;
            if (this.activePane) this.activePane.el.classList.add('active');
          }
          if (this.panes.length === 0) {
            this._renderEmpty();
          } else {
            this.layout();
          }
          this._updateToolbar();
          this._renderTabs();
          renderSessions(allSessions);
        }

        focus(pane) {
          if (!pane) return;
          this.panes.forEach((p) => p.el.classList.toggle('active', p === pane));
          this.activePane = pane;
          this._renderTabs();
          if (typeof updateSessionHighlights === 'function') updateSessionHighlights();
        }

        layout() {
          var n = this.panes.length;
          var cols, rows;
          if (n <= 1) {
            cols = 1;
            rows = 1;
          } else if (n === 2) {
            cols = 2;
            rows = 1;
          } else if (n <= 4) {
            cols = 2;
            rows = 2;
          } else if (n <= 6) {
            cols = 3;
            rows = 2;
          } else {
            cols = 4;
            rows = 2;
          }
          this.container.className = 'cols-' + cols + ' rows-' + rows;
        }

        _updateToolbar() {
          var n = this.panes.length;
          paneCountEl.textContent = n + ' pane' + (n === 1 ? '' : 's');
          addPaneBtn.disabled = n >= MAX_PANES;
        }

        // 現在開かれているセッションIDの集合（サイドバーのアクティブ表示用）
        openSessionIds() {
          var ids = new Set();
          this.panes.forEach((p) => {
            if (p.sessionId) ids.add(p.sessionId);
          });
          return ids;
        }
      }

      const paneManager = new PaneManager(panesContainer);

      // ─── トップレベル操作 ───
      function openSessionInActivePane(id) {
        // 既に開いてるペインがあればそっちにフォーカス（重複オープン禁止）
        var existing = paneManager.panes.find(function (p) {
          return p.sessionId === id;
        });
        if (existing) {
          paneManager.focus(existing);
          closeSidebar();
          return;
        }
        var pane = paneManager.activePane;
        if (!pane) {
          pane = paneManager.add({ sessionId: id });
        } else if (pane.sending) {
          // アクティブペインが送信中なら中断せず新しいペインで開く
          // (中断すると裏でバックエンドの処理が走ったまま画面から消えてしまうため)
          paneManager.add({ sessionId: id });
        } else {
          pane.loadSession(id);
        }
        closeSidebar();
      }

      function openSessionInNewPane(id) {
        // 既に開いてるペインがあればそっちにフォーカス（重複オープン禁止）
        var existing = paneManager.panes.find(function (p) {
          return p.sessionId === id;
        });
        if (existing) {
          paneManager.focus(existing);
          closeSidebar();
          return;
        }
        paneManager.add({ sessionId: id });
        closeSidebar();
      }

      async function newSessionInActivePane() {
        var pane = paneManager.activePane;
        if (!pane) {
          pane = paneManager.add({});
        } else if (pane.sending) {
          // アクティブペインが送信中なら中断せず新しいペインで開く
          // (上限到達で add() が null を返した場合は何もせず諦める)
          pane = paneManager.add({});
          if (!pane) return;
        }
        await pane.newSession();
      }

      function addEmptyPane() {
        var pane = paneManager.add({});
        pane.inputEl.placeholder = 'Select a session or click + New Chat';
      }

      // ─── セッション一覧 ───
      async function loadSessions() {
        try {
          var res = await fetch('/api/sessions');
          var data = await res.json();
          allSessions = data.sessions || [];
          renderSessions(allSessions);
          // autoTalk=true セッションがあれば polling を起動（既存があれば no-op）
          // 逆に OFF になったセッションは止める
          var activeAuto = {};
          allSessions.forEach(function (s) {
            if (s.autoTalk) activeAuto[s.id] = true;
          });
          Object.keys(autoTalkPollers).forEach(function (id) {
            if (!activeAuto[id]) stopAutoTalkPolling(id);
          });
          Object.keys(activeAuto).forEach(function (id) {
            startAutoTalkPolling(id);
          });
        } catch (e) {}
      }

      // フォーカス中ペインのセッションだけ「current」を付け替える（全再描画は不要）
      function updateSessionHighlights() {
        var openIds = paneManager.openSessionIds();
        var currentId = paneManager.activePane ? paneManager.activePane.sessionId : null;
        var items = sessionListEl.querySelectorAll('.session-item');
        items.forEach(function (item) {
          var id = item.getAttribute('data-id');
          item.classList.toggle('active', openIds.has(id));
          item.classList.toggle('current', !!currentId && id === currentId);
        });
      }

      function renderSessions(sessions) {
        sessionListEl.innerHTML = '';
        var openIds = paneManager.openSessionIds();
        var currentId = paneManager.activePane ? paneManager.activePane.sessionId : null;
        var lastDate = '';
        for (var i = 0; i < sessions.length; i++) {
          var s = sessions[i];
          var date = (s.updatedAt || s.createdAt || '').slice(0, 10);
          if (date !== lastDate) {
            lastDate = date;
            var g = document.createElement('div');
            g.className = 'date-group';
            g.textContent = getDateLabel(date);
            sessionListEl.appendChild(g);
          }
          var item = document.createElement('div');
          item.className =
            'session-item session-row' +
            (openIds.has(s.id) ? ' active' : '') +
            (currentId && s.id === currentId ? ' current' : '');
          var icon =
            s.platform === 'web' ? '\u{1F310}' : s.platform === 'slack' ? '\u{1F4AC}' : '\u{1F48E}';
          var active = s.isActive ? '\u{1F7E2} ' : '';
          item.setAttribute('data-id', s.id);
          var label = document.createElement('span');
          label.className = 'label';
          // 自走 ON のセッションには「🤖 自走中」バッジを行頭に追加
          if (s.autoTalk) {
            var atBadge = document.createElement('span');
            atBadge.className = 'autotalk-badge';
            atBadge.textContent = '\u{1F916} 自走中';
            label.appendChild(atBadge);
            label.appendChild(document.createTextNode(' '));
          }
          label.appendChild(document.createTextNode(active + icon + ' ' + (s.title || s.id)));
          label.addEventListener(
            'click',
            (function (id) {
              return function () {
                openSessionInActivePane(id);
              };
            })(s.id)
          );
          item.appendChild(label);

          if (s.isActive) {
            // タイムアウト UI は pane 内 (Stop ボタン右) に表示する。
            // サイドバーには [残り MM:SS]/[+5m] を出さない方針 (からあげ指示, 5/17)。
            // sessionTimeouts には pane の tick 用に同期だけしておく。
            if (s.timeoutAt) {
              setSessionTimeout(s.id, {
                active: true,
                timeoutAt: s.timeoutAt,
                maxTimeoutAt: s.maxTimeoutAt,
                timeoutMs: s.timeoutMs,
              });
            }

            var stopBtn = document.createElement('span');
            stopBtn.className = 'row-act stop-btn';
            stopBtn.textContent = '\u{23F9}';
            stopBtn.title = 'ランナーを停止（セッションは残ります）';
            stopBtn.addEventListener(
              'click',
              (function (id) {
                return function (e) {
                  e.stopPropagation();
                  stopRunner(id);
                };
              })(s.id)
            );
            item.appendChild(stopBtn);
          }

          // 自走モード（auto-talk）トグル — web セッションのみ表示
          if (s.platform === 'web') {
            var atBtn = document.createElement('span');
            atBtn.className = 'row-act autotalk-btn' + (s.autoTalk ? ' on' : '');
            atBtn.textContent = '\u{1F916}';
            atBtn.title = s.autoTalk
              ? '自走モード ON — agent がランダム間隔で発話中（クリックで停止）'
              : '自走モード OFF — クリックで開始（agent が一定時間ごとに勝手に発話）';
            atBtn.addEventListener(
              'click',
              (function (id, on) {
                return function (e) {
                  e.stopPropagation();
                  toggleAutoTalk(id, !on);
                };
              })(s.id, s.autoTalk)
            );
            item.appendChild(atBtn);
          }

          var pinBtn = document.createElement('span');
          pinBtn.className = 'row-act pin-btn';
          pinBtn.textContent = '\u{2197}';
          pinBtn.title = '新しいペインで並べて開く';
          pinBtn.addEventListener(
            'click',
            (function (id) {
              return function (e) {
                e.stopPropagation();
                openSessionInNewPane(id);
              };
            })(s.id)
          );
          item.appendChild(pinBtn);

          var delBtn = document.createElement('span');
          delBtn.className = 'row-act del-btn';
          delBtn.textContent = '\u{00D7}';
          delBtn.title = 'セッションを削除';
          delBtn.addEventListener(
            'click',
            (function (id) {
              return function (e) {
                e.stopPropagation();
                deleteSessionById(id);
              };
            })(s.id)
          );
          item.appendChild(delBtn);

          sessionListEl.appendChild(item);
        }
      }

      function getDateLabel(d) {
        var today = new Date().toISOString().slice(0, 10);
        var y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        if (d === today) return 'Today';
        if (d === y) return 'Yesterday';
        return d;
      }

      function filterSessions(q) {
        if (!q) {
          renderSessions(allSessions);
          return;
        }
        q = q.toLowerCase();
        renderSessions(
          allSessions.filter(function (s) {
            return (s.title || s.id).toLowerCase().indexOf(q) >= 0;
          })
        );
      }

      async function stopRunner(id) {
        try {
          await fetch('/api/sessions/' + encodeURIComponent(id) + '/stop', { method: 'POST' });
          // 自分のペインで開いていたら、進行中の SSE を中断
          paneManager.panes.forEach(function (p) {
            if (p.sessionId === id && p.sending && p.abortController) {
              try {
                p.abortController.abort();
              } catch (_) {}
            }
          });
          loadSessions();
        } catch (e) {}
      }

      // 軽量トースト通知
      var _toastEl = null;
      var _toastTimer = null;
      function showToast(msg, kind) {
        if (!_toastEl) {
          _toastEl = document.createElement('div');
          _toastEl.className = 'toast';
          document.body.appendChild(_toastEl);
        }
        _toastEl.textContent = msg;
        _toastEl.className = 'toast' + (kind ? ' ' + kind : '');
        // reflow して visible 付与
        void _toastEl.offsetWidth;
        _toastEl.classList.add('visible');
        if (_toastTimer) clearTimeout(_toastTimer);
        _toastTimer = setTimeout(function () {
          if (_toastEl) _toastEl.classList.remove('visible');
        }, 2400);
      }

      async function toggleAutoTalk(id, enabled) {
        try {
          var res = await fetch('/api/sessions/' + encodeURIComponent(id) + '/autotalk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: !!enabled }),
          });
          if (!res.ok) {
            var msg = '自走モード切替に失敗';
            try {
              var err = await res.json();
              if (err && err.error) msg = err.error;
            } catch (_) {}
            showToast('⚠ ' + msg);
            return;
          }
          loadSessions();
          // 自走 ON のセッションを開いていれば、新着発話を polling で拾う
          if (enabled) startAutoTalkPolling(id);
          else stopAutoTalkPolling(id);
          showToast(
            enabled
              ? '🤖 自走モード ON — agent がランダム間隔で発話します'
              : '🤖 自走モード OFF',
            enabled ? 'success' : ''
          );
        } catch (e) {
          showToast('⚠ 自走モード切替に失敗: ' + (e && e.message ? e.message : e));
        }
      }

      // 自走モードのセッションは agent が裏で発話するので、開いてるペインを定期リフレッシュ
      var autoTalkPollers = {};
      function startAutoTalkPolling(sessionId) {
        if (autoTalkPollers[sessionId]) return;
        autoTalkPollers[sessionId] = setInterval(function () {
          paneManager.panes.forEach(function (p) {
            if (p.sessionId === sessionId && !p.sending && typeof p.refreshHistory === 'function') {
              p.refreshHistory();
            }
          });
        }, 8000);
      }
      function stopAutoTalkPolling(sessionId) {
        if (autoTalkPollers[sessionId]) {
          clearInterval(autoTalkPollers[sessionId]);
          delete autoTalkPollers[sessionId];
        }
      }

      async function deleteSessionById(id) {
        if (!confirm('Delete this session?')) return;
        try {
          await fetch('/api/sessions/' + encodeURIComponent(id), { method: 'DELETE' });
          // 開いてるペインがあれば、空状態に戻す
          paneManager.panes.forEach(function (p) {
            if (p.sessionId === id) {
              p.sessionId = null;
              p.platform = 'web';
              p.messagesEl.innerHTML =
                '<div class="empty-state">Session deleted.<br>Select another or click <button type="button" class="empty-cta" onclick="newSessionInActivePane()">+ New Chat</button></div>';
              p._setTitle('');
              p.inputEl.disabled = true;
              p.sendBtn.disabled = true;
              p.inputEl.placeholder = 'Select a session or start a new chat';
            }
          });
          loadSessions();
        } catch (e) {}
      }

      // ─── 初期化 ───
      window._uploadAccept = '';
      var timeoutExtendEnabled = true;
      (async function init() {
        try {
          var res = await fetch('/api/config');
          var cfg = await res.json();
          window._uploadAccept = cfg.uploadAccept || '';
          if (typeof cfg.timeoutExtendEnabled === 'boolean') {
            timeoutExtendEnabled = cfg.timeoutExtendEnabled;
          }
        } catch (e) {
          /* 失敗時はフィルタ無し (全許可) のまま */
        }
        loadSessions();
        // 前回開いていたペイン構成を localStorage から復元する。
        // 保存が無い（初回訪問 or 全ペインを閉じた状態で更新した）場合のみ、
        // 従来通り空ペイン1個を用意する。
        var restored = false;
        try {
          var raw = localStorage.getItem(PANE_STATE_KEY);
          if (raw) {
            var saved = JSON.parse(raw);
            if (saved && Array.isArray(saved.ids) && saved.ids.length > 0) {
              // add() は上限超過時に alert() を出すので、復元時は静かに切り詰める
              saved.ids.slice(0, MAX_PANES).forEach(function (id) {
                paneManager.add(id ? { sessionId: id } : {});
              });
              var activePane = paneManager.panes[saved.activeIdx];
              if (activePane) paneManager.focus(activePane);
              restored = true;
            }
          }
        } catch (_) {
          // 壊れた保存データは無視してデフォルト動作にフォールバック
        }
        if (!restored) {
          paneManager.add({});
        }
      })();
      // ドラッグ&ドロップ：アクティブペインに添付
      document.body.addEventListener('dragover', function (e) {
        e.preventDefault();
      });
      document.body.addEventListener('drop', function (e) {
        e.preventDefault();
        if (!paneManager.activePane) return;
        if (e.dataTransfer && e.dataTransfer.files.length > 0) {
          for (var f of e.dataTransfer.files) {
            paneManager.activePane._addPendingFile(f);
          }
        }
      });
    </script>
  </body>
</html>
