<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>xangi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <style>
      /* Linear-inspired tokens — see knowledge/design_systems/linear.md */
      :root {
        color-scheme: dark;
        --canvas: #010102;
        --surface-1: #0f1011;
        --surface-2: #141516;
        --surface-3: #18191a;
        --hairline: #23252a;
        --hairline-strong: #34343a;
        --primary: #5e6ad2;
        --primary-hover: #828fff;
        --primary-focus: #5e69d1;
        --on-primary: #ffffff;
        --ink: #f7f8f8;
        --ink-muted: #d0d6e0;
        --ink-subtle: #8a8f98;
        --ink-tertiary: #62666d;
        --danger: #e5484d;
        --danger-bg: rgba(229, 72, 77, 0.12);
        --danger-border: rgba(229, 72, 77, 0.35);
        --focus-ring: rgba(94, 105, 210, 0.5);
        --code-bg: rgba(255, 255, 255, 0.05);

        --radius-xs: 4px;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-pill: 9999px;

        --font-sans:
          'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, 'Segoe UI',
          Roboto, sans-serif;
        --font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --canvas: #ffffff;
          --surface-1: #f7f8f9;
          --surface-2: #eef0f2;
          --surface-3: #e4e6e9;
          --hairline: #e1e3e6;
          --hairline-strong: #c2c5ca;
          --on-primary: #ffffff;
          --ink: #08090a;
          --ink-muted: #2b2f36;
          --ink-subtle: #6b7280;
          --ink-tertiary: #9aa0a6;
          --danger: #d92a36;
          --danger-bg: rgba(217, 42, 54, 0.08);
          --danger-border: rgba(217, 42, 54, 0.25);
          --focus-ring: rgba(94, 105, 210, 0.35);
          --code-bg: rgba(0, 0, 0, 0.05);
        }
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: -0.05px;
        background: var(--canvas);
        color: var(--ink);
        height: 100dvh;
        display: flex;
        overflow: hidden;
      }
      /* サイドバー */
      #sidebar {
        width: 260px;
        background: var(--surface-1);
        border-right: 1px solid var(--hairline);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }
      #sidebar .top {
        padding: 12px;
        border-bottom: 1px solid var(--hairline);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #sidebar .new-btn {
        width: 100%;
        background: var(--primary);
        color: var(--on-primary);
        border: 1px solid transparent;
        padding: 8px 14px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1.2;
        transition: background 0.15s ease;
      }
      #sidebar .new-btn:hover {
        background: var(--primary-hover);
      }
      #sidebar .new-btn:active {
        background: var(--primary-focus);
      }
      #sidebar .new-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }
      #sidebar input[type='text'] {
        width: 100%;
        background: var(--surface-2);
        color: var(--ink);
        border: 1px solid var(--hairline);
        padding: 8px 12px;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      #sidebar input[type='text']::placeholder {
        color: var(--ink-tertiary);
      }
      #sidebar input[type='text']:focus {
        border-color: var(--primary-focus);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }
      #session-list {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px 4px;
      }
      .date-group {
        padding: 12px 12px 4px;
        color: var(--ink-tertiary);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .session-item {
        padding: 7px 10px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-radius: var(--radius-sm);
        margin: 1px 4px;
        color: var(--ink-muted);
        transition:
          background 0.12s ease,
          color 0.12s ease;
      }
      .session-item:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .session-item.active {
        background: var(--surface-2);
        color: var(--ink);
        box-shadow: inset 2px 0 0 var(--primary);
      }
      /* フォーカス中のペインが開いているセッション（＝現在のペイン） */
      .session-item.current,
      .session-item.current:hover {
        background: var(--focus-ring);
        color: var(--ink);
        font-weight: 600;
        box-shadow: inset 3px 0 0 var(--primary-hover);
      }
      /* メインエリア（ペイン群コンテナ） */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--canvas);
      }
      #panes-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 6px 12px;
        border-bottom: 1px solid var(--hairline);
        background: var(--canvas);
        min-height: 40px;
      }
      #panes-toolbar #menu-btn {
        display: none;
        background: none;
        border: none;
        color: var(--ink-subtle);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: var(--radius-sm);
      }
      #panes-toolbar #menu-btn:hover {
        color: var(--ink);
        background: var(--surface-2);
      }
      #panes-toolbar h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.2px;
        color: var(--ink);
        white-space: nowrap;
      }
      #panes-toolbar .spacer {
        flex: 1;
      }
      #panes-toolbar .pane-count {
        font-size: 12px;
        color: var(--ink-subtle);
      }
      #panes-toolbar .add-pane-btn {
        background: var(--surface-1);
        color: var(--ink-muted);
        border: 1px solid var(--hairline);
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        transition:
          background 0.12s ease,
          color 0.12s ease,
          border-color 0.12s ease;
      }
      #panes-toolbar .add-pane-btn:hover {
        background: var(--surface-2);
        color: var(--ink);
        border-color: var(--hairline-strong);
      }
      #panes-toolbar .add-pane-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #panes-toolbar a.tool-link {
        font-size: 12px;
        color: var(--ink-subtle);
        text-decoration: none;
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        transition:
          background 0.12s ease,
          color 0.12s ease,
          border-color 0.12s ease;
      }
      #panes-toolbar a.tool-link:hover {
        background: var(--surface-2);
        color: var(--ink);
        border-color: var(--hairline);
      }
      #panes-container {
        flex: 1;
        display: grid;
        gap: 1px;
        background: var(--hairline);
        min-width: 0;
        min-height: 0;
      }
      #panes-container.cols-1 {
        grid-template-columns: 1fr;
      }
      #panes-container.cols-2 {
        grid-template-columns: 1fr 1fr;
      }
      #panes-container.cols-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      #panes-container.cols-4 {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
      #panes-container.rows-1 {
        grid-template-rows: 1fr;
      }
      #panes-container.rows-2 {
        grid-template-rows: 1fr 1fr;
      }
      /* ペイン */
      .pane {
        background: var(--canvas);
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        position: relative;
        overflow: hidden;
      }
      /* 非アクティブなペインをほんの少し沈めて、現在ペインをさりげなく示す */
      .pane:not(.active) {
        opacity: 0.82;
        transition: opacity 0.12s ease;
      }
      .pane.active {
        z-index: 2;
      }
      .pane.active::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 2px var(--primary);
        z-index: 1;
      }
      .pane-header {
        background: var(--canvas);
        padding: 8px 12px;
        border-bottom: 1px solid var(--hairline);
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        flex-shrink: 0;
        transition: box-shadow 0.12s ease;
      }
      /* アクティブペインのヘッダー上端に細いアクセントバー */
      .pane.active .pane-header {
        box-shadow: inset 0 2px 0 var(--primary);
      }
      /* アクティブペインのタイトル枠の背景をアクセント色に */
      .pane.active .pane-title:not(.empty),
      .pane.active .pane-title:not(.empty):hover {
        background: var(--focus-ring);
        color: var(--ink);
      }
      .pane-title {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.1px;
        color: var(--ink);
        cursor: pointer;
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: background 0.12s ease;
      }
      .pane-title:hover {
        background: var(--surface-2);
      }
      .pane-title.empty {
        color: var(--ink-tertiary);
        font-style: italic;
        font-weight: 400;
      }
      .pane-close {
        background: none;
        border: none;
        color: var(--ink-tertiary);
        font-size: 16px;
        cursor: pointer;
        padding: 2px 8px;
        border-radius: var(--radius-sm);
        line-height: 1;
        transition:
          color 0.12s ease,
          background 0.12s ease;
        flex-shrink: 0;
      }
      .pane-close:hover {
        color: var(--danger);
        background: var(--surface-2);
      }
      .pane-messages {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }
      .msg-wrapper {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-width: 720px;
        width: 100%;
      }
      .msg-wrapper.user {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg-wrapper.assistant,
      .msg-wrapper.error,
      .msg-wrapper.thinking {
        align-self: flex-start;
        align-items: flex-start;
      }
      .msg {
        max-width: 100%;
        padding: 10px 14px;
        border-radius: var(--radius-lg);
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        letter-spacing: -0.05px;
        border: 1px solid var(--hairline);
      }
      .msg.user {
        background: var(--surface-2);
        color: var(--ink);
        border-color: var(--hairline-strong);
      }
      .msg.assistant {
        background: var(--surface-1);
        color: var(--ink);
      }
      .msg.error {
        background: var(--danger-bg);
        border-color: var(--danger-border);
        color: var(--ink);
      }
      .msg.thinking {
        background: var(--surface-1);
        color: var(--ink-subtle);
        font-style: italic;
      }
      .msg.assistant {
        font-size: 14px !important;
      }
      .msg.assistant * {
        font-size: inherit !important;
        max-width: 100%;
      }
      .msg.assistant a {
        color: var(--primary);
        text-decoration: underline;
        text-decoration-color: var(--hairline-strong);
        text-underline-offset: 2px;
      }
      .msg.assistant a:hover {
        text-decoration-color: var(--primary);
      }
      .msg.assistant code {
        background: var(--code-bg);
        border: 1px solid var(--hairline);
        padding: 1px 5px;
        border-radius: var(--radius-xs);
        font-family: var(--font-mono);
        font-size: 12.5px !important;
      }
      .msg.assistant pre {
        background: var(--canvas);
        border: 1px solid var(--hairline);
        padding: 12px;
        border-radius: var(--radius-md);
        overflow-x: auto;
        margin: 8px 0;
      }
      .msg.assistant pre code {
        padding: 0;
        background: none;
        border: none;
        font-size: 13px !important;
      }
      .msg.assistant ul,
      .msg.assistant ol {
        padding-left: 20px;
        margin: 6px 0;
      }
      .msg.assistant h1,
      .msg.assistant h2,
      .msg.assistant h3,
      .msg.assistant h4,
      .msg.assistant h5,
      .msg.assistant h6 {
        font-size: 14px !important;
        font-weight: 600;
        letter-spacing: -0.2px;
        margin: 10px 0 4px;
      }
      .msg.assistant p {
        margin: 6px 0;
      }
      .msg.assistant blockquote {
        border-left: 2px solid var(--primary);
        padding-left: 10px;
        color: var(--ink-subtle);
        margin: 6px 0;
      }
      .msg.assistant table {
        border-collapse: collapse;
        margin: 8px 0;
        max-width: 100%;
        display: block;
        overflow-x: auto;
      }
      .msg.assistant th,
      .msg.assistant td {
        border: 1px solid var(--hairline-strong);
        padding: 4px 10px;
      }
      .msg.assistant th {
        background: var(--surface-2);
        font-weight: 600;
      }
      /* コードブロック右上のコピーボタン */
      .msg.assistant pre {
        position: relative;
      }
      .code-copy-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-xs);
        padding: 2px 8px;
        font-size: 11px !important;
        line-height: 1.6;
        color: var(--ink-subtle);
        font-family: inherit;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s;
        /* 手動でメッセージ本文をドラッグ選択したときに 'Copy' が
           選択範囲に含まれないようにする（opacity:0 でも選択対象になるため）。 */
        user-select: none;
      }
      .msg.assistant pre:hover .code-copy-btn {
        opacity: 1;
      }
      .code-copy-btn:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .msg-time {
        font-size: 11px;
        color: var(--ink-tertiary);
        padding: 0 6px;
      }
      .msg-usage {
        font-size: 11px;
        color: var(--ink-subtle);
        padding: 2px 6px;
      }
      .msg-usage span {
        margin-right: 8px;
      }
      /* 入力エリア */
      .pane-input-area {
        background: var(--canvas);
        padding: 10px 14px 12px;
        border-top: 1px solid var(--hairline);
        display: flex;
        gap: 6px;
        align-items: flex-end;
        flex-shrink: 0;
      }
      .pane-composer {
        flex: 1;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-lg);
        padding: 6px 6px 6px 8px;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        min-width: 0;
      }
      .pane-composer:focus-within {
        border-color: var(--primary-focus);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }
      .pane-input {
        flex: 1;
        background: transparent;
        color: var(--ink);
        border: none;
        padding: 8px 4px;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: -0.05px;
        outline: none;
        resize: none;
        min-height: 36px;
        max-height: 160px;
        line-height: 1.5;
        min-width: 0;
      }
      .pane-input::placeholder {
        color: var(--ink-tertiary);
      }
      .pane-attach-btn {
        background: none;
        border: none;
        color: var(--ink-subtle);
        font-size: 16px;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        min-height: 32px;
        touch-action: manipulation;
        transition:
          color 0.12s ease,
          background 0.12s ease;
        flex-shrink: 0;
      }
      .pane-attach-btn:hover {
        color: var(--ink);
        background: var(--surface-2);
      }
      .pane-file-input {
        display: none;
      }
      .pane-attach-preview {
        display: none;
        padding: 6px 14px;
        background: var(--canvas);
        border-top: 1px solid var(--hairline);
        font-size: 12px;
        color: var(--ink-subtle);
        flex-shrink: 0;
      }
      .pane-attach-preview .preview-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        margin-right: 4px;
        margin-bottom: 4px;
      }
      .pane-attach-preview .preview-item img {
        max-height: 40px;
        border-radius: var(--radius-xs);
      }
      .pane-attach-preview .remove-btn {
        color: var(--ink-subtle);
        cursor: pointer;
        font-weight: 500;
        padding: 0 2px;
        transition: color 0.12s ease;
      }
      .pane-attach-preview .remove-btn:hover {
        color: var(--danger);
      }
      .msg img {
        max-width: 100%;
        border-radius: var(--radius-md);
        margin: 6px 0;
        border: 1px solid var(--hairline);
      }
      .action-btn {
        border: none;
        padding: 7px 14px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        font-size: 13px;
        letter-spacing: 0;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        min-height: 34px;
        transition:
          background 0.15s ease,
          color 0.15s ease;
        flex-shrink: 0;
      }
      .action-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }
      .pane-send {
        background: var(--primary);
        color: var(--on-primary);
      }
      .pane-send:hover {
        background: var(--primary-hover);
      }
      .pane-send:active {
        background: var(--primary-focus);
      }
      .pane-send:disabled {
        background: var(--surface-2);
        color: var(--ink-tertiary);
        cursor: not-allowed;
      }
      .pane-stop {
        background: var(--danger);
        color: #fff;
        display: none;
        font-size: 16px;
        line-height: 1;
        padding: 7px 12px;
      }
      .pane-stop:hover {
        filter: brightness(1.08);
      }
      .pane-extend {
        background: rgba(99, 102, 241, 0.18);
        color: var(--primary, #818cf8);
        display: none;
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        padding: 7px 10px;
        margin-left: 4px;
      }
      .pane-extend:hover {
        background: rgba(99, 102, 241, 0.28);
      }
      .pane-extend:disabled {
        background: rgba(156, 163, 175, 0.1);
        color: var(--muted, #9ca3af);
        cursor: not-allowed;
      }
      .pane-timeout {
        display: none;
        align-self: center;
        margin-left: 6px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        color: var(--muted, #9ca3af);
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }
      .pane-timeout.warn {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.12);
        animation: timeout-pulse 1s ease-in-out infinite;
      }
      /* メッセージのホバー時に出る ⋯ アクションメニュー (Discord 風) */
      .msg-wrapper {
        position: relative;
      }
      .msg-actions {
        position: absolute;
        top: -10px;
        right: 0;
        display: none;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-md);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        z-index: 2;
        overflow: hidden;
      }
      .msg-wrapper.user .msg-actions {
        right: 0;
        left: auto;
      }
      .msg-wrapper.assistant .msg-actions {
        left: 0;
        right: auto;
      }
      .msg-wrapper:hover .msg-actions {
        display: flex;
      }
      .msg-actions.open {
        display: flex;
      }
      .msg-action-btn {
        background: transparent;
        border: none;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
        color: var(--ink);
        font-family: inherit;
        line-height: 1;
      }
      .msg-action-btn:hover {
        background: var(--surface-2);
      }
      .msg-action-btn.danger {
        color: var(--danger);
      }
      .reply-suggestions {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        margin-top: 6px;
      }
      .reply-suggestions-toggle,
      .reply-suggestion-option {
        border: 1px solid var(--hairline);
        border-radius: var(--radius-md);
        background: var(--surface-1);
        color: var(--ink-secondary);
        padding: 5px 9px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .reply-suggestions-toggle:hover,
      .reply-suggestion-option:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .reply-suggestions-options {
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
        max-width: min(100%, 520px);
      }
      .reply-suggestions.open .reply-suggestions-options {
        display: flex;
      }
      .reply-suggestion-option {
        text-align: left;
      }
      /* インライン編集 textarea */
      .msg-edit {
        width: 100%;
        min-height: 60px;
        font-family: inherit;
        font-size: 14px;
        padding: 8px;
        border-radius: var(--radius-md);
        border: 1px solid var(--hairline);
        background: var(--surface-1);
        color: var(--ink);
        resize: vertical;
        box-sizing: border-box;
      }
      .msg-edit-actions {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .msg-edited-label {
        font-size: 10px;
        color: var(--ink-subtle);
        font-style: italic;
        padding: 0 6px;
      }
      /* セッションリストの行内アクション */
      .session-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
      }
      .session-row .label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .session-row .row-act {
        color: var(--ink-tertiary);
        cursor: pointer;
        padding: 0 4px;
        font-size: 13px;
        flex-shrink: 0;
        line-height: 1;
        transition: color 0.12s ease;
        opacity: 0;
      }
      .session-row:hover .row-act {
        opacity: 1;
      }
      .session-row .pin-btn:hover {
        color: var(--primary);
      }
      .session-row .del-btn:hover {
        color: var(--danger);
      }
      .session-row .stop-btn {
        opacity: 1;
        color: #4ade80;
      }
      .session-row .stop-btn:hover {
        color: var(--danger);
      }
      .session-row .autotalk-btn:hover {
        color: var(--primary);
      }
      .session-row .autotalk-btn.on {
        opacity: 1;
        color: #f59e0b;
        animation: autotalk-pulse 1.6s ease-in-out infinite;
      }
      @keyframes autotalk-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.18);
        }
      }
      /* タイムアウト残り時間表示 (アクティブセッションのみ) */
      .session-row .timeout-display {
        display: inline-block;
        margin-right: 6px;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        color: var(--muted, #9ca3af);
        padding: 1px 6px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        /* .row-act は hover 時しか opacity:1 にならないが、これは常時表示 */
        opacity: 1;
      }
      .session-row .timeout-display.warn {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.12);
        animation: timeout-pulse 1s ease-in-out infinite;
      }
      @keyframes timeout-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
      /* +5m 延長ボタン */
      .session-row .extend-btn {
        cursor: pointer;
        opacity: 0.85;
        font-size: 11px;
        font-weight: 600;
        padding: 1px 6px;
        margin-right: 4px;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.18);

      .session-row .extend-btn:hover {
        opacity: 1;
        background: rgba(99, 102, 241, 0.28);
      }
      .session-row .extend-btn.disabled {
        cursor: not-allowed;
        opacity: 0.35;
        background: rgba(156, 163, 175, 0.1);
        color: var(--muted, #9ca3af);
      }
      .session-row .extend-btn.disabled:hover {
        background: rgba(156, 163, 175, 0.1);
      }
      /* セッション行の "🤖 自走中" インラインバッジ */
      .session-row .autotalk-badge {
        display: inline-block;
        margin-right: 4px;
        font-size: 11px;
        padding: 1px 5px;
        border-radius: 8px;
        background: rgba(245, 158, 11, 0.18);
        color: #f59e0b;
        font-weight: 600;
      }
      /* 画面下に出る軽量トースト */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        padding: 10px 16px;
        background: var(--surface-1);
        color: var(--ink);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-md);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        font-size: 13px;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .toast.visible {
        opacity: 1;
      }
      .toast.success {
        border-color: #f59e0b;
        color: #f59e0b;
      }
      /* Resume / Continue ボタン（read-only セッション用） */
      .resume-btn {
        background: var(--surface-1);
        color: var(--ink);
        border: 1px solid var(--hairline);
        padding: 8px 14px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        margin: 12px auto;
        display: block;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }
      .resume-btn:hover {
        background: var(--surface-2);
        border-color: var(--hairline-strong);
      }
      /* 空状態 */
      .empty-state {
        text-align: center;
        color: var(--ink-subtle);
        padding: 64px 20px;
        font-size: 14px;
        line-height: 1.7;
      }
      .empty-state strong {
        color: var(--ink);
        font-weight: 500;
      }
      /* 空状態テキスト中のクリッカブル「+ New Chat」 */
      .empty-cta {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        font: inherit;
        color: var(--ink);
        font-weight: 500;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .empty-cta:hover {
        color: var(--accent, var(--ink));
      }
      .empty-cta:focus-visible {
        outline: 2px solid var(--accent, var(--hairline-strong));
        outline-offset: 2px;
        border-radius: 2px;
      }
      /* 全ペイン閉じた時の状態 */
      .panes-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-subtle);
        font-size: 14px;
        text-align: center;
        padding: 20px;
        line-height: 1.7;
      }
      .panes-empty strong {
        color: var(--ink);
        font-weight: 500;
      }
      /* ツール実行ライン */
      .tool-line {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--ink-subtle);
        padding: 2px 0;
        letter-spacing: 0;
      }
      /* スクロールバー */
      #session-list::-webkit-scrollbar,
      .pane-messages::-webkit-scrollbar,
      .pane-input::-webkit-scrollbar {
        width: 8px;

      }
      #session-list::-webkit-scrollbar-thumb,
      .pane-messages::-webkit-scrollbar-thumb,
      .pane-input::-webkit-scrollbar-thumb {
