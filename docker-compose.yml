# 共通設定
x-common: &common
  restart: unless-stopped
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    # Claude Code CLI 認証情報（コンテナ専用ボリューム）
    - claude-data:/home/node/.claude
    # Codex CLI 認証情報（コンテナ専用ボリューム）
    - codex-data:/home/node/.codex
    # ワークスペース（エージェントの作業ディレクトリ）
    - ${XANGI_WORKSPACE:-./workspace}:/workspace
    # プロンプト（XANGI_COMMANDS.md等）
    - ./prompts:/app/prompts:ro
    # Git設定
    - ~/.gitconfig:/home/node/.gitconfig:ro
    # GitHub App秘密鍵（オプション、設定時のみ有効）
    - ${GITHUB_APP_PRIVATE_KEY_PATH:-/dev/null}:/secrets/github-app.pem:ro
    # インスタンス間チャット共有ディレクトリ（INTER_INSTANCE_CHAT_ENABLED=true 時に使用）
    # ホスト直/コンテナ混在運用のため、ホストとコンテナで同パスにする
    - ${INTER_INSTANCE_CHAT_DIR:-/tmp/xangi-chat}:/tmp/xangi-chat:rw
  environment: &common-env
    # env_fileから読み込まれない固定値のみここに記述
    - NODE_ENV=production
    - WORKSPACE_PATH=/workspace
    - DATA_DIR=/workspace/.xangi
    # LLMサーバーへの接続（.envで未設定時のデフォルト）
    # Ollama: http://ollama:11434
    - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-http://ollama:11434}

services:
  # ミニマム版（デフォルト）
  xangi:
    <<: *common
    image: xangi:latest
    build:
      context: .
      dockerfile: docker/Dockerfile

  # フル版（uv + Python）
  xangi-max:
    <<: *common
    image: xangi:max
    build:
      context: .
      dockerfile: docker/Dockerfile.max

  # GPU版（CUDA + uv + Python + PyTorch）
  xangi-gpu:
    <<: *common
    image: xangi:gpu
    build:
      context: .
      dockerfile: docker/Dockerfile.gpu
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Ollama（GPU付きコンテナ）
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ${OLLAMA_MODELS_PATH:-/usr/share/ollama/.ollama}:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  claude-data:
  codex-data:
